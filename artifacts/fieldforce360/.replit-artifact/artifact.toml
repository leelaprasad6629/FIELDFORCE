kind = "web"
previewPath = "/"
title = "FieldForce360"
version = "1.0.0"
id = "artifacts/fieldforce360"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19298

[services.development]
run = "pnpm --filter @workspace/fieldforce360 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fieldforce360", "run", "build" ]
publicDir = "artifacts/fieldforce360/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19298"
BASE_PATH = "/"
